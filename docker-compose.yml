services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nodejs-practice
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data 
      - ./.env:/app/.env
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/app.sqlite
      - PORT=3000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/status', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge